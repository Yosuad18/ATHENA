services:
  # 1. FRONTEND (React)
  frontend:
    build:
      context: ./Frontend/ATHENAreact
      dockerfile: Dockerfile
    container_name: athena-frontend
    ports:
      - "8080:80"
    networks:
      - athena-network
    depends_on:
      - backend

  # 2. BACKEND (Laravel con PHP-FPM)
  backend:
    build:
      context: ./Backend/Repository-ATHENA-Laravel
      dockerfile: Dockerfile
    container_name: athena-backend
    restart: unless-stopped
    volumes:
      - ./Backend/Repository-ATHENA-Laravel:/var/www
    env_file:
      - ./Backend/Repository-ATHENA-Laravel/.env
    networks:
      - athena-network
    depends_on:
      - db

  # 3. BASE DE DATOS (MySQL)
  db:
    image: mysql:8.0
    container_name: athena-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: Athena
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - athena-db-data:/var/lib/mysql
    networks:
      - athena-network

networks:
  athena-network:
    driver: bridge

volumes:
  athena-db-data:
    driver: local